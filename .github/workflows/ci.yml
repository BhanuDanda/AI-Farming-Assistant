name: CI Validation

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate backend JavaScript syntax
        run: |
          node --check backend/server.js
          node --check backend/controllers/farmingController.js

      - name: Validate frontend JavaScript syntax
        run: |
          node --check frontend/script.js
